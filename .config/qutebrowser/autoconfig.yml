# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  auto_save.session:
    global: true
  bindings.commands:
    global:
      normal:
        ',M': hint links spawn mpv {hint-url}
        ',m': spawn mpv {url}
  colors.tabs.pinned.even.bg:
    global: darkseagreen
  colors.webpage.bg:
    global: null
  colors.webpage.darkmode.algorithm:
    global: brightness-rgb
  colors.webpage.darkmode.contrast:
    global: 0.05
  colors.webpage.darkmode.enabled:
    global: true
  colors.webpage.darkmode.policy.images:
    global: never
  colors.webpage.darkmode.threshold.background:
    global: 100
  content.autoplay:
    global: false
  content.cookies.accept:
    global: no-3rdparty
  content.cookies.store:
    global: true
  content.notifications.presenter:
    global: libnotify
  content.pdfjs:
    global: true
  fonts.default_size:
    global: 16pt
  fonts.web.size.default:
    global: 24
  url.open_base_url:
    global: true
  url.searchengines:
    global:
      DEFAULT: https://duckduckgo.com/?q={}
      a: https://www.amazon.com/s?k={}
      ain: https://www.amazon.in/s?k={}
      ap: https://archlinux.org/packages/?q={}
      aur: https://aur.archlinux.org/packages?K={}
      aw: https://wiki.archlinux.org/?search={}
      b: https://search.brave.com/search?q={}
      d: https://duckduckgo.com/?q={}
      el: https://elpa.gnu.org/packages/{}.html
      em : https://melpa.org/#/?q={}
      fk: https://www.flipkart.com/search?q={}
      g: https://www.google.com/search?hl=en&q={}
      gh: https://github.com/search?q={}&type=repositories
      gu: https://github.com/search?q={}&type=users
      gw: https://wiki.gentoo.org/?search={}
      lf: https://forum.luanti.org/search.php?keywords={}
      lp: https://content.luanti.org/packages/?q={}
      lt: https://ctan.org/search?phrase={}
      lw: https://en.wikibooks.org/wiki/Special:Search?search={}&prefix=LaTeX%2F&fulltext=Search+this+book&fulltext=Search
      man: https://man.archlinux.org/man/{}.1
      mw: https://wiki.minetest.org/{}
      p: https://metacpan.org/search?size=20&q={}
      r: https://cran.r-project.org/package={}
      rd: https://www.reddit.com/search?q={}
      s: https://stackoverflow.com/search?q={}
      sc: https://www.shellcheck.net/wiki/{}
      w: https://en.wikipedia.org/wiki/{}
  url.start_pages:
    global: https://start.duckduckgo.com
  zoom.default:
    global: 125%
  zoom.levels:
    global:
    - 25%
    - 33%
    - 50%
    - 67%
    - 75%
    - 90%
    - 100%
    - 110%
    - 125%
    - 150%
    - 175%
    - 200%
    - 250%
    - 300%
    - 400%
    - 500%
